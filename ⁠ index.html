<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دووگۆڵی مۆندیال - قۆناغی کۆمەڵەکان 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

  :root {
    --pitch: #0a3d1f;
    --pitch-light: #0f5128;
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.15);
    --gold-border: rgba(245,200,66,0.25);
    --red: #e63946;
    --red-glow: rgba(230,57,70,0.35);
    --white: #f0f7f2;
    --muted: #7a9e8a;
    --card-bg: rgba(255,255,255,0.045);
    --card-hover: rgba(255,255,255,0.08);
    --radius: 20px;
    --radius-lg: 32px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--pitch);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(15,81,40,0.8) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 58px, rgba(255,255,255,0.012) 58px, rgba(255,255,255,0.012) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 58px, rgba(255,255,255,0.012) 58px, rgba(255,255,255,0.012) 60px);
    min-height: 100vh;
    font-family: 'Cairo', 'Segoe UI', sans-serif;
    color: var(--white);
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }
  header::after {
    content: '';
    display: block;
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
    border-radius: 2px;
  }
  .logo-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .logo-img {
    width: 90px;
    filter: drop-shadow(0 0 18px rgba(245,200,66,0.5));
    transition: transform 0.4s ease;
  }
  .logo-img:hover { transform: rotate(-4deg) scale(1.08); }
  .site-name {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
    line-height: 1;
  }
  .tagline {
    font-size: 14px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .controls {
    max-width: 1000px;
    margin: 0 auto 28px;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
  }
  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card-bg);
    color: var(--muted);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 40px;
    padding: 7px 18px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold-border);
    color: var(--gold);
  }
  .live-badge-count {
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 8px;
    margin-right: 4px;
    display: inline-block;
    animation: pulse-badge 1.5s ease-in-out infinite;
  }
  @keyframes pulse-badge {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .match-card {
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
    position: relative;
    overflow: hidden;
  }
  .match-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245,200,66,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .match-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--gold-border);
    background: var(--card-hover);
    border-color: var(--gold-border);
  }
  .match-card.live-card {
    border-color: rgba(230,57,70,0.4);
    box-shadow: 0 0 0 1px rgba(230,57,70,0.2);
  }
  .match-card.live-card::before {
    background: linear-gradient(135deg, rgba(230,57,70,0.06) 0%, transparent 60%);
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .time-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-size: 15px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 40px;
    white-space: nowrap;
  }
  .time-chip svg { width: 14px; height: 14px; fill: var(--gold); flex-shrink: 0; }

  .live-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(230,57,70,0.15);
    border: 1px solid rgba(230,57,70,0.35);
    color: var(--red);
    font-size: 13px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 40px;
    white-space: nowrap;
    animation: live-pulse 2s ease-in-out infinite;
  }
  .live-dot {
    width: 7px; height: 7px;
    background: var(--red);
    border-radius: 50%;
    display: inline-block;
    animation: live-pulse 1.2s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .finished-chip {
    background: rgba(120,120,120,0.12);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 40px;
    white-space: nowrap;
  }

  .countdown {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-right: auto;
    flex-direction: row-reverse;
  }
  .cd-unit {
    text-align: center;
  }
  .cd-num {
    display: block;
    font-size: 18px;
    font-weight: 900;
    color: var(--white);
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 2px 8px;
    min-width: 36px;
    line-height: 1.4;
  }
  .cd-label {
    display: block;
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .cd-sep {
    font-size: 20px;
    font-weight: 900;
    color: var(--muted);
    margin-top: -8px;
  }

  .teams-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 90px;
  }
  .team-flag {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  .team-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    text-align: center;
  }
  .vs-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .vs-text {
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 2px;
  }
  .score-display {
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(245,200,66,0.3);
  }
  .score-display.hidden { display: none; }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .commentators {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--muted);
    font-size: 13px;
    flex-wrap: wrap;
  }
  .commentators svg { width: 14px; height: 14px; fill: var(--gold); opacity: 0.7; flex-shrink: 0; }
  .watch-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(145deg, #e63946, #c1121f);
    color: #fff;
    text-decoration: none;
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 18px var(--red-glow);
    transition: all 0.25s ease;
    white-space: nowrap;
  }
  .watch-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 28px rgba(230,57,70,0.55);
  }
  .watch-btn svg { width: 15px; height: 15px; fill: #fff; flex-shrink: 0; }
  .watch-btn.disabled {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    box-shadow: none;
    cursor: default;
    pointer-events: none;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    padding: 8px 0 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(245,200,66,0.15);
    margin-top: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(245,200,66,0.1);
  }

  .admin-toggle {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(245,200,66,0.45);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: transform 0.2s;
  }
  .admin-toggle:hover { transform: scale(1.05); }
  .admin-toggle svg { width: 16px; height: 16px; fill: #000; }

  .admin-panel {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    padding: 20px;
  }
  .admin-panel.open { display: flex; }
  .admin-box {
    background: #0e3d20;
    border: 1px solid var(--gold-border);
    border-radius: var(--radius-lg);
    padding: 28px 28px 32px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .admin-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .close-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--muted);
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

  .field-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .field-group.full { grid-template-columns: 1fr; }
  .field-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--white);
    font-size: 14px;
    font-family: inherit;
    width: 100%;
    transition: border-color 0.2s;
  }
  .field-input:focus {
    outline: none;
    border-color: var(--gold-border);
    background: rgba(255,255,255,0.09);
  }
  .field-input option { background: #0a3d1f; }
  .add-btn {
    width: 100%;
    margin-top: 16px;
    background: linear-gradient(145deg, var(--gold), #d4a800);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-size: 15px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .add-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 6px 20px rgba(245,200,66,0.4);
  }
  .existing-list {
    margin-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 16px;
  }
  .existing-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .existing-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--white);
  }
  .del-btn {
    background: rgba(230,57,70,0.15);
    border: 1px solid rgba(230,57,70,0.25);
    color: var(--red);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .del-btn:hover { background: rgba(230,57,70,0.3); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state svg { width: 48px; height: 48px; fill: var(--muted); opacity: 0.4; margin-bottom: 14px; }
  .empty-state p { font-size: 15px; }

  footer {
    text-align: center;
    padding: 0 20px 40px;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .card-top { gap: 8px; }
    .teams-row { gap: 10px; }
    .team-flag { font-size: 28px; }
    .score-display { font-size: 28px; }
    .card-bottom { flex-direction: column; align-items: stretch; }
    .watch-btn { justify-content: center; }
    .countdown { flex-direction: row; }
    .cd-num { font-size: 15px; min-width: 28px; }
    .field-group { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <img class="logo-img" src="https://i.ibb.co/prv7R1K0/245-AFB20-FEB6-4772-9-D5-B-C2-ADB8343-D50.png" alt="دووگۆڵی مۆندیال">
    <div>
      <div class="site-name">دووگۆڵی مۆندیال</div>
      <div class="tagline">قۆناغی کۆمەڵەکان · مۆندیالی 2026</div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="filter-group">
    <button class="filter-btn active" data-filter="all" onclick="applyFilter('all',this)">هەموو</button>
    <button class="filter-btn" data-filter="live" onclick="applyFilter('live',this)">
      <span class="live-badge-count" id="live-count">0</span> ڕاستەوخۆ
    </button>
    <button class="filter-btn" data-filter="upcoming" onclick="applyFilter('upcoming',this)">داهاتوو</button>
    <button class="filter-btn" data-filter="finished" onclick="applyFilter('finished',this)">کۆتایی پێهاتوو</button>
  </div>
</div>

<main class="main" id="matches-container"></main>

<footer>دووگۆڵی · هێزی نوێی میدیای تۆپی پێ · مۆندیالی 2026</footer>

<button class="admin-toggle" onclick="toggleAdmin()">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
  پانێلی ئەدمین
</button>

<div class="admin-panel" id="admin-panel" onclick="panelOutsideClick(event)">
  <div class="admin-box">
    <div class="admin-title">
      ➕ زیادکردنی یارییەکی نوێ
      <button class="close-btn" onclick="toggleAdmin()">✕</button>
    </div>
    <div class="field-group">
      <div>
        <div class="field-label">تیمی یەکەم 🏴</div>
        <input class="field-input" id="f-team1" placeholder="ناوی تیم" />
      </div>
      <div>
        <div class="field-label">تیمی دووەم 🏴</div>
        <input class="field-input" id="f-team2" placeholder="ناوی تیم" />
      </div>
    </div>
    <div class="field-group">
      <div>
        <div class="field-label">ئایکۆنی تیمی یەکەم</div>
        <input class="field-input" id="f-flag1" placeholder="🇮🇶 ئیموجی ئەلەم" />
      </div>
      <div>
        <div class="field-label">ئایکۆنی تیمی دووەم</div>
        <input class="field-input" id="f-flag2" placeholder="🏴󠁧󠁢󠁥󠁮󠁧󠁿 ئیموجی ئەلەم" />
      </div>
    </div>
    <div class="field-group">
      <div>
        <div class="field-label">کاتی دەستپێکردن</div>
        <input class="field-input" id="f-time" type="datetime-local" />
      </div>
      <div>
        <div class="field-label">دۆخی یاری</div>
        <select class="field-input" id="f-status">
          <option value="upcoming">داهاتوو</option>
          <option value="live">ڕاستەوخۆ 🔴</option>
          <option value="finished">کۆتایی هاتوو</option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <div>
        <div class="field-label">گۆڵی تیمی یەکەم</div>
        <input class="field-input" id="f-score1" type="number" min="0" placeholder="0" />
      </div>
      <div>
        <div class="field-label">گۆڵی تیمی دووەم</div>
        <input class="field-input" id="f-score2" type="number" min="0" placeholder="0" />
      </div>
    </div>
    <div class="field-group full">
      <div>
        <div class="field-label">بێژەرەکان</div>
        <input class="field-input" id="f-commentators" placeholder="ناوی بێژەرەکان، بە کۆما جیابکەرەوە" />
      </div>
    </div>
    <div class="field-group full">
      <div>
        <div class="field-label">لینکی پەخش</div>
        <input class="field-input" id="f-link" placeholder="https://..." />
      </div>
    </div>
    <div class="field-group">
      <div>
        <div class="field-label">ناوی گروپ</div>
        <input class="field-input" id="f-group" placeholder="نموونە: گروپ A" />
      </div>
      <div>
        <div class="field-label">قۆناغی یاری</div>
        <select class="field-input" id="f-stage">
          <option value="">---</option>
          <option value="گروپ">قۆناغی گروپ</option>
          <option value="٣٢">قۆناغی ٣٢</option>
          <option value="١٦">قۆناغی ١٦</option>
          <option value="چارەک">قۆناغی چارەک</option>
          <option value="نیو">نیوفاینەڵ</option>
          <option value="فاینەڵ">فاینەڵ 🏆</option>
        </select>
      </div>
    </div>
    <button class="add-btn" onclick="addMatch()">✅ زیادکردن</button>
    <div class="existing-list" id="existing-list"></div>
  </div>
</div>

<script>
// ========== ALL MATCHES DATA ==========
let matches = [
  // 🗓 شەممە 20-06-2026
  { id: 1, team1: 'هۆڵەندا', team2: 'سوید', flag1: '🇳🇱', flag2: '🇸🇪', time: '2026-06-20T20:00:00', status: 'upcoming', score1: null, score2: null, commentators: '---', link: '', group: 'گروپ A', stage: 'قۆناغی گروپ' },

let currentFilter = 'all';

// ========== SAVE & LOAD ==========
function save() { localStorage.setItem('doogali_matches', JSON.stringify(matches)); }

// Load from localStorage if exists
const saved = localStorage.getItem('doogali_matches');
if (saved) {
  try {
    const parsed = JSON.parse(saved);
    if (Array.isArray(parsed) && parsed.length > 0) matches = parsed;
  } catch(e) {}
}

// ========== RENDER ==========
function render() {
  const container = document.getElementById('matches-container');
  let filtered = matches;
  if (currentFilter !== 'all') filtered = matches.filter(m => m.status === currentFilter);

  const liveCount = matches.filter(m => m.status === 'live').length;
  document.getElementById('live-count').textContent = liveCount;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <p>هیچ یارییەک نەدۆزرایەوە بۆ ئەم بەشە</p>
    </div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(m => {
    const date = new Date(m.time);
    const dateStr = date.toLocaleDateString('ku', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    if (!groups[dateStr]) groups[dateStr] = [];
    groups[dateStr].push(m);
  });

  let html = '';
  Object.entries(groups).forEach(([label, gMatches]) => {
    html += `<div class="section-label">📅 ${label}</div>`;
    gMatches.forEach(m => { html += buildCard(m); });
  });
  container.innerHTML = html;
  startCountdowns();
}

function buildCard(m) {
  const isLive = m.status === 'live';
  const isFinished = m.status === 'finished';
  const matchDate = new Date(m.time);
  const timeStr = matchDate.toLocaleTimeString('ku', { hour: '2-digit', minute: '2-digit' });

  let statusHtml = '';
  if (isLive) statusHtml = `<span class="live-chip"><span class="live-dot"></span> ڕاستەوخۆ</span>`;
  else if (isFinished) statusHtml = `<span class="finished-chip">کۆتایی پێهاتوو</span>`;

  let countdownHtml = '';
  if (!isLive && !isFinished) {
    countdownHtml = `<div class="countdown" id="cd-${m.id}">
      <div class="cd-unit"><span class="cd-num" id="cd-s-${m.id}">--</span><span class="cd-label">چرکە</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-m-${m.id}">--</span><span class="cd-label">خولەک</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-h-${m.id}">--</span><span class="cd-label">ساعەت</span></div>
      <span class="cd-sep">:</span>
      <div class="cd-unit"><span class="cd-num" id="cd-d-${m.id}">--</span><span class="cd-label">ڕۆژ</span></div>
    </div>`;
  }

  const scoreVisible = (isLive || isFinished) && m.score1 !== null && m.score2 !== null;
  const vsOrScore = scoreVisible
    ? `<div class="score-display">${m.score1} – ${m.score2}</div>`
    : `<div class="vs-text">VS</div>`;

  const btnHtml = m.link && m.link !== ''
    ? `<a href="${m.link}" class="watch-btn" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        تەماشابکە
      </a>`
    : `<button class="watch-btn disabled">پەخش بەردەست نییە</button>`;

  const groupLabel = m.group ? ` · ${m.group}` : '';

  return `<div class="match-card ${isLive ? 'live-card' : ''}" data-status="${m.status}" data-id="${m.id}">
    <div class="card-top">
      <span class="time-chip">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        ${timeStr}
      </span>
      <span style="color:var(--muted);font-size:12px;font-weight:600;">${groupLabel}</span>
      ${statusHtml}
      ${countdownHtml}
    </div>

    <div class="teams-row">
      <div class="team">
        <div class="team-flag">${m.flag1 || '🏴'}</div>
        <div class="team-name">${m.team1}</div>
      </div>
      <div class="vs-wrap">${vsOrScore}</div>
      <div class="team">
        <div class="team-flag">${m.flag2 || '🏴'}</div>
        <div class="team-name">${m.team2}</div>
      </div>
    </div>

    <div class="card-bottom">
      <div class="commentators">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        ${m.commentators || '---'}
      </div>
      ${btnHtml}
    </div>
  </div>`;
}

// ========== COUNTDOWNS ==========
let countdownInterval = null;

function startCountdowns() {
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    matches.forEach(m => {
      if (m.status !== 'upcoming') return;
      updateCountdown(m);
    });
  }, 1000);
}

function updateCountdown(m) {
  const el = document.getElementById(`cd-${m.id}`);
  if (!el) return;
  const now = Date.now();
  const target = new Date(m.time).getTime();
  const diff = target - now;
  if (diff <= 0) {
    el.innerHTML = `<span style="color:var(--gold);font-size:13px;font-weight:700;">🔜 بەم زووانە دەستپێدەکات</span>`;
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const mn = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const fmt = n => String(n).padStart(2, '0');
  const dEl = document.getElementById(`cd-d-${m.id}`);
  const hEl = document.getElementById(`cd-h-${m.id}`);
  const mEl = document.getElementById(`cd-m-${m.id}`);
  const sEl = document.getElementById(`cd-s-${m.id}`);
  if (dEl) dEl.textContent = fmt(d);
  if (hEl) hEl.textContent = fmt(h);
  if (mEl) mEl.textContent = fmt(mn);
  if (sEl) sEl.textContent = fmt(s);
}

// ========== FILTER ==========
function applyFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

// ========== ADMIN ==========
function toggleAdmin() {
  const panel = document.getElementById('admin-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderExisting();
}

function panelOutsideClick(e) {
  if (e.target === document.getElementById('admin-panel')) toggleAdmin();
}

function renderExisting() {
  const el = document.getElementById('existing-list');
  if (!matches.length) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="existing-title">📋 یارییەکانی تۆمارکراو (${matches.length})</div>` +
    matches.map(m => `<div class="existing-item">
      <span>${m.flag1||'🏴'} ${m.team1} vs ${m.team2} ${m.flag2||'🏴'} — ${m.group || ''}</span>
      <button class="del-btn" onclick="deleteMatch(${m.id})">🗑 بیسڕەرەوە</button>
    </div>`).join('');
}

function deleteMatch(id) {
  if (!confirm('دڵنیایت لە سڕینەوەی ئەم یارییە؟ ئەم کارە ناگەڕێتەوە!')) return;
  matches = matches.filter(m => m.id !== id);
  save(); render(); renderExisting();
}

function addMatch() {
  const team1 = document.getElementById('f-team1').value.trim();
  const team2 = document.getElementById('f-team2').value.trim();
  if (!team1 || !team2) { alert('تکایە ناوی هەردوو تیمەکە بنووسە'); return; }
  const t = document.getElementById('f-time').value;
  const newMatch = {
    id: Date.now(),
    team1, team2,
    flag1: document.getElementById('f-flag1').value.trim() || '🏴',
    flag2: document.getElementById('f-flag2').value.trim() || '🏴',
    time: t ? new Date(t).toISOString() : new Date().toISOString(),
    status: document.getElementById('f-status').value,
    score1: document.getElementById('f-score1').value !== '' ? parseInt(document.getElementById('f-score1').value) : null,
    score2: document.getElementById('f-score2').value !== '' ? parseInt(document.getElementById('f-score2').value) : null,
    commentators: document.getElementById('f-commentators').value.trim() || '---',
    link: document.getElementById('f-link').value.trim(),
    group: document.getElementById('f-group').value.trim(),
    stage: document.getElementById('f-stage').value || 'قۆناغی گروپ'
  };
  matches.push(newMatch);
  save(); render(); renderExisting();
  // Clear fields
  ['f-team1','f-team2','f-flag1','f-flag2','f-time','f-score1','f-score2','f-commentators','f-link','f-group'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-status').value = 'upcoming';
  document.getElementById('f-stage').value = '';
  alert('✅ یارییەک بە سەرکەوتوویی زیادکرا!');
}

// ========== AUTO CHECK LIVE STATUS ==========
function checkLiveStatus() {
  const now = Date.now();
  let changed = false;
  matches.forEach(m => {
    if (m.status === 'upcoming') {
      const matchTime = new Date(m.time).getTime();
      const diff = matchTime - now;
      // If match started (within 5 min ago or started)
      if (diff <= 60000 && diff > -7200000) {
        m.status = 'live';
        changed = true;
      } else if (diff < -7200000) {
        m.status = 'finished';
        changed = true;
      }
    }
  });
  if (changed) { save(); render(); }
}

// ========== INIT ==========
render();
checkLiveStatus();
setInterval(checkLiveStatus, 30000);
setInterval(render, 60000);
</script>
